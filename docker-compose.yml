services:
  uploads_init:
    image: alpine:3.20
    command: sh -lc "mkdir -p /data/courses && chown -R 100:101 /data"
    volumes:
      - uploads:/data
    restart: "no"

  course_db:
    image: postgres:17-alpine
    container_name: course_db
    env_file: [.env]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # ports:
    #   - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks: [course_net]

  db_init:
    image: postgres:17-alpine
    depends_on:
      course_db:
        condition: service_healthy
    env_file: [.env]
    environment:
      # Дадим psql пароль через переменную окружения
      PGPASSWORD: ${POSTGRES_PASSWORD}
    command: >
      sh -lc '
      psql -h course_db -U "$$POSTGRES_USER" -d postgres -Atqc
      "SELECT 1 FROM pg_database WHERE datname = '\''$$POSTGRES_DB'\''"
      || psql -h course_db -U "$$POSTGRES_USER" -d postgres -c
      "CREATE DATABASE \"$$POSTGRES_DB\" OWNER \"$$POSTGRES_USER\";"
      '
    networks: [course_net]
    restart: "no"

  course_api:
    image: fra1m/course-api:latest
    container_name: course_api
    env_file: [.env]
    environment:
      NODE_ENV: production
      POSTGRES_HOST: course_db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      API_PORT: ${API_PORT:-8080}
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      UPLOAD_DIR: /app/uploads/courses
    depends_on:
      course_db:
        condition: service_healthy
      db_init:
        condition: service_completed_successfully
      uploads_init:
        condition: service_completed_successfully
    expose:
      - "8080"
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8080/health >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks: [course_net]

  client:
    image: fra1m/course-client:latest
    container_name: course_client
    # Эта переменная в рантайме не нужна, но не мешает
    environment:
      VITE_API_BASE: /course_api
    ports:
      - "80:80"
    depends_on:
      - course_api
    restart: unless-stopped
    networks: [course_net]

volumes:
  pgdata:
  uploads:

networks:
  course_net:
    driver: bridge
